---
name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  discover:
    name: Discover Modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Discover modules
        id: scan
        uses: mirceanton/action-folder-matrix@955d4f90db109dff0e99542877bd25e52544db9c # v3.0.7
        with:
          path: "./modules"

  publish:
    name: "Publish (${{ matrix.directory }})"
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Login to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive module
        working-directory: modules/${{ matrix.directory }}
        run: tar -czf "/tmp/${{ matrix.directory }}.tar.gz" .

      - name: Push module
        env:
          MODULE: ${{ matrix.directory }}
          VERSION: ${{ inputs.version || github.ref_name }}
          REGISTRY: ghcr.io/${{ github.repository }}
        run: |
          oras push "${REGISTRY}/${MODULE}:${VERSION}" \
            --artifact-type "application/vnd.opentofu.modulev1+zip" \
            --disable-path-validation \
            "/tmp/${MODULE}.tar.gz:application/vnd.opentofu.module.layer.v1.tar+gzip"
